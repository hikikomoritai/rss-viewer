<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>まとめサイト 最新記事一覧（10件）</title>
<style>
body {
  font-family: sans-serif;
  margin: 20px;
  background-color: #121212;
  color: #e0e0e0;
}
h1 {
  font-size: 24px;
  color: #ffffff;
}
.site {
  margin-bottom: 30px;
  background: #1e1e1e;
  padding: 15px;
  border-radius: 8px;
  border: 1px solid #333;
}
.site h2 a {
  color: #80cbc4;
  text-decoration: none;
}
.site h2 a:hover {
  text-decoration: underline;
}
li a {
  color: #90caf9;
  text-decoration: none;
}
li a:hover {
  text-decoration: underline;
}
span {
  color: #aaaaaa;
}
</style>
</head>
<body>

<h1>まとめサイト 最新記事一覧（10件）</h1>

<div id="sites"></div>

<script>
// ▼ RSS / JSON / HTML を混在で扱うサイト一覧
const sites = [
  { name: "痛いニュース(ﾉ∀`)", rss: "https://itainews.com/index.xml" },
  { name: "ニュー速クオリティ", rss: "http://news4vip.livedoor.biz/index.xml" },
  { name: "カナ速", rss: "http://kanasoku.info/index.xml" },
  { name: "VIPPERな俺", rss: "http://blog.livedoor.jp/news23vip/index.xml" },
  { name: "IT速報", rss: "http://blog.livedoor.jp/itsoku/index.xml" },
  { name: "Happyou FS", rss: "https://www.happyou.info/fs/gen.php?u=-974488574&p=-1429471147" },
  { name: "汎用型自作PCまとめ", rss: "http://www.jisaka.com/index.xml" }
];

// ▼ 形式判定（XML / JSON / HTML）
async function fetchFeed(url) {
  const api = "https://rss-api-xghm.onrender.com/rss?url=";
  const res = await fetch(api + encodeURIComponent(url));
  const text = await res.text();

  // JSON Feed 判定
  if (text.trim().startsWith("{")) {
    try {
      const json = JSON.parse(text);
      if (json.items) return { type: "json", data: json };
    } catch (e) {}
  }

  // XML / RDF / Atom 判定
  const xml = new DOMParser().parseFromString(text, "text/xml");
  if (xml.querySelector("rss, rdf, feed")) {
    return { type: "xml", data: xml };
  }

  // HTML 判定
  if (text.includes("<html")) {
    return { type: "html", data: text };
  }

  return null;
}


// ▼ XML / RDF / Atom
function parseXmlFeed(xml) {
  const items = [...xml.querySelectorAll("item, entry")];
  return items.slice(0, 10).map(item => ({
    title: item.querySelector("title")?.textContent ?? "",
    link:
      item.querySelector("link")?.textContent ||
      item.querySelector("link")?.getAttribute("href"),
    date:
      item.querySelector("pubDate")?.textContent ||
      item.querySelector("dc\\:date")?.textContent ||
      item.querySelector("updated")?.textContent ||
      item.querySelector("published")?.textContent ||
      null
  }));
}

// ▼ JSON Feed
function parseJsonFeed(json) {
  return json.items.slice(0, 10).map(item => ({
    title: item.title,
    link: item.url,
    date: item.date_published || item.date_modified || null
  }));
}

// ▼ HTML（RSS が無いサイト用）
function parseHtmlFeed(htmlText) {
  const doc = new DOMParser().parseFromString(htmlText, "text/html");

  // よくある記事構造に対応
  const articles = [
    ...doc.querySelectorAll("article, .post, .entry, li, .news, .topic")
  ].slice(0, 10);

  return articles.map(a => ({
    title:
      a.querySelector("h1, h2, h3, a")?.textContent?.trim() ?? "タイトル不明",
    link: a.querySelector("a")?.href ?? "#",
    date:
      a.querySelector("time")?.getAttribute("datetime") ||
      a.querySelector("time")?.textContent ||
      null
  }));
}

// ▼ サイトごとの処理
async function loadLatest(site) {
  let feed;
  try {
    feed = await fetchFeed(site.rss);
  } catch (e) {
    return `<div class="site"><h2>${site.name}</h2>取得できませんでした。</div>`;
  }

  if (!feed) {
    return `<div class="site"><h2>${site.name}</h2>対応していない形式です。</div>`;
  }

  let items = [];

  if (feed.type === "xml") items = parseXmlFeed(feed.data);
  else if (feed.type === "json") items = parseJsonFeed(feed.data);
  else if (feed.type === "html") items = parseHtmlFeed(feed.data);

  let html = `<div class="site"><h2><a href="${site.rss}" target="_blank">${site.name}</a></h2><ul>`;

  for (const item of items) {
    const dateText = item.date ? new Date(item.date).toLocaleString() : "日付なし";
    html += `<li><a href="${item.link}" target="_blank">${item.title}</a> <span>（${dateText}）</span></li>`;
  }

  html += "</ul></div>";
  return html;
}

// ▼ メイン処理
async function main() {
  let html = "";
  for (const site of sites) {
    html += await loadLatest(site);
  }
  document.getElementById("sites").innerHTML = html;
}

main();
</script>

</body>
</html>
