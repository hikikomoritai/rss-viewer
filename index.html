<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>まとめサイト 最新記事一覧（10件）</title>
<style>
body {
  font-family: sans-serif;
  margin: 20px;
  background-color: #121212;
  color: #e0e0e0;
}
h1 {
  font-size: 24px;
  color: #ffffff;
}
.site {
  margin-bottom: 30px;
  background: #1e1e1e;
  padding: 15px;
  border-radius: 8px;
  border: 1px solid #333;
}
.site h2 a {
  color: #80cbc4;
  text-decoration: none;
}
.site h2 a:hover {
  text-decoration: underline;
}
li a {
  color: #90caf9;
  text-decoration: none;
}
li a:hover {
  text-decoration: underline;
}
span {
  color: #aaaaaa;
}
</style>
</head>
<body>

<h1>まとめサイト 最新記事一覧（10件）</h1>

<div id="sites"></div>

<script>
// ▼ サイト一覧
const sites = [
  { name: "痛いニュース(ﾉ∀`)", rss: "http://blog.livedoor.jp/dqnplus/index.rdf" },
  { name: "ニュー速クオリティ", rss: "https://news4vip.livedoor.biz/index.xml" },
  { name: "カナ速", rss: "http://kanasoku.info/index.xml" },
  { name: "VIPPERな俺", rss: "http://blog.livedoor.jp/news23vip/index.xml" },
  { name: "IT速報", rss: "http://blog.livedoor.jp/itsoku/index.xml" },
  { name: "Happyou FS", rss: "https://www.happyou.info/fs/gen.php?u=-974488574&p=-1429471147" },
  { name: "汎用型自作PCまとめ", rss: "http://www.jisaka.com/index.xml" }
];

// ▼ API から JSON を取得（あなたの API は常に JSON 配列を返す）
async function fetchFeed(url) {
  const api = "https://api.rss2json.com/v1/api.json?rss_url=";
  const res = await fetch(api + encodeURIComponent(url));
  const json = await res.json();
  return json.items; // RSS2JSON の形式
}

// ▼ JSON 配列をそのまま使う
function parseJsonFeed(items) {
  return items.slice(0, 10).map(item => ({
    title: item.title,
    link: item.link,
    date: item.date
  }));
}

// ▼ サイトごとの処理
async function loadLatest(site) {
  let items = [];

  try {
    const json = await fetchFeed(site.rss);
    items = parseJsonFeed(json);
  } catch (e) {
    return `<div class="site"><h2>${site.name}</h2>取得できませんでした。</div>`;
  }

  let html = `<div class="site"><h2><a href="${site.rss}" target="_blank">${site.name}</a></h2><ul>`;

  for (const item of items) {
    const dateText = item.date ? new Date(item.date).toLocaleString() : "日付なし";
    html += `<li><a href="${item.link}" target="_blank">${item.title}</a> <span>（${dateText}）</span></li>`;
  }

  html += "</ul></div>";
  return html;
}

// ▼ メイン処理
async function main() {
  let html = "";
  for (const site of sites) {
    html += await loadLatest(site);
  }
  document.getElementById("sites").innerHTML = html;
}

main();
</script>

</body>
</html>
