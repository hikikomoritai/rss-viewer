
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>まとめサイト 最新記事一覧</title>
<style>
/* ===========================
   カラーテーマ定義
=========================== */
:root {
  /* デフォルト：ダーク（青系） */
  --bg-color: #121212;
  --card-bg: #1e1e1e;
  --text-color: #e0e0e0;
  --accent-color: #224a8b;    /* ボタン等のメイン色 */
  --link-color: #90caf9;
  --title-color: #4488ff;
  --border-color: #333;
  --input-bg: #303030;
  --input-border: #4b5563;
  --toast-bg: #333;
}

/* 緑系テーマ */
body.theme-green {
  --accent-color: #2e7d32;
  --link-color: #a5d6a7;
  --title-color: #44ff88;
}

/* 赤系テーマ */
body.theme-red {
  --accent-color: #8b2222;
  --link-color: #ef9a9a;
  --title-color: #ff4488;
}

/* ライトモード */
body.theme-light {
  --bg-color: #f8f9fa;      /* ほんのりグレーで眩しさを軽減 */
  --card-bg: #ffffff;
  --text-color: #2c3e50;    /* 真っ黒ではなく濃い紺グレーで柔らかく */
  --accent-color: #3182ce;  /* 清潔感のあるブルー */
  --link-color: #2b6cb0;
  --title-color: #2d3748;   /* タイトルは落ち着いた色に */
  --border-color: #e2e8f0;  /* 境界線はより薄く、存在感を抑える */
  --input-bg: #ffffff;
  --input-border: #cbd5e0;
  --toast-bg: #2d3748;
}

/* ===========================
   基本テーマ
=========================== */
body {
  font-family: sans-serif;
  margin: 20px;
  background-color: var(--bg-color);
  color: var(--text-color);
  transition: background-color 0.3s, color 0.3s;
}

/* ドラッグ中の拡大鏡/選択防止 */
.sorting-active {
  user-select: none !important;
  -webkit-user-select: none !important;
  touch-action: none !important;
}

h1 {
  font-size: 24px;
  color: var(--text-color);
}

/* ===========================
   カード（サイト・設定共通）
=========================== */
.site,
#settingsBox {
  background: var(--card-bg);
  padding: 15px;
  border-radius: 8px;
  border: 1px solid var(--border-color);
  margin-bottom: 20px;
}

/* ===========================
   サイトカード
=========================== */
.site {
  position: relative;
}

.siteHeader {
  display: flex;
  align-items: center;
  gap: 12px;
}

.siteHeader h2 {
  margin: 0;
  display: flex;
  align-items: center;
  white-space: nowrap;
}

.site h2 a {
  color: var(--title-color);
  text-decoration: none;
}
.site h2 a:hover {
  text-decoration: underline;
}

li a {
  color: var(--link-color);
  text-decoration: none;
}
li a:hover {
  text-decoration: underline;
}

span.date {
  color: #aaaaaa;
}

/* ===========================
   ボタン
=========================== */
button {
  background: var(--accent-color);
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  -webkit-tap-highlight-color: transparent;
}

button:hover { filter: brightness(1.2); }
button:active { filter: brightness(0.8); }

.deleteBtn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #a12f2f !important; /* 削除はテーマに関わらず赤固定 */
  width: 30px;
  height: 30px;
  padding: 0;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

.edit-title {
  padding: 4px 6px;
  font-size: 16px;
  background: #444; /* グレー系で固定 */
  border-radius: 4px;
}

/* ===========================
   入力フォーム
=========================== */
input,
select {
  background: var(--input-bg);
  color: var(--text-color);
  border: 1px solid var(--input-border);
  padding: 6px;
  border-radius: 6px;
  font-size: 16px;
}

input:focus,
select:focus {
  outline: none;
  border-color: var(--accent-color);
  box-shadow: 0 0 4px var(--accent-color);
}

.limitInput {
  width: 40px;
  text-align: center;
  padding: 6px 1px;
}

input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

/* ===========================
   件数スピナー
=========================== */
.numberWrapper {
  display: inline-flex;
  align-items: center;
}
.errorWrapper {
  height: auto;   /* ← 高さ固定を解除 */
  min-height: 32px; /* ← 必要なら最低高さだけ確保 */
  display: inline-flex;
  align-items: center;
}
.customSpinner {
  display: flex;
  flex-direction: column;
  margin-left: 4px;
  gap: 2px;
}

.customSpinner button {
  width: 20px;
  height: 16px;
  font-size: 12px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===========================
   並び替えモード
=========================== */
#sortList {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

.draggable {
  width: 70%; 
  min-width: 300px; 
  background-color: var(--card-bg);
  border: 1px solid var(--border-color);
  padding: 10px;
  margin-bottom: 30px;
  border-radius: 8px;
  box-sizing: border-box;
  touch-action: none;
  position: relative;
  cursor: grab;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}

.draggable.dragging {
  background-color: var(--accent-color) !important;
  opacity: 0.8;
  z-index: 1000;
  pointer-events: none;
}

.placeholder {
  background: rgba(128, 128, 128, 0.1);
  border: 1px dashed var(--border-color);
  border-radius: 8px;
  margin-bottom: 30px;
}

/* ===========================
   ドロップエリア
=========================== */
.drop-area {
  padding: 20px;
  border: 2px dashed var(--input-border);
  border-radius: 8px;
  width: 100%;
  max-width: 500px;
  background: var(--card-bg);
  transition: background 0.2s, border-color 0.2s;
  text-align: center; /* 中央寄せ追加 */
}

/* ドラッグオーバー時の色も変数化 */
.drop-area.dragover {
  background: var(--input-bg);
  border-color: var(--accent-color);
}

.drop-area .zone-title {
  font-size: 1em;
  margin-bottom: 8px;
  /* 文字色をテーマのメインテキストに合わせる */
  color: var(--text-color); 
  font-weight: bold;
}

.drop-area .zone-desc {
  font-size: 0.85em;
  /* 説明文は少し薄くするが、ライトモードでも読める範囲に設定 */
  color: var(--text-color);
  opacity: 0.7;
  margin-top: 6px;
}

.import-desc {
  margin-top: 5px;
  font-size: 0.9em;
  /* 枠外の説明文もテーマに追従 */
  color: var(--text-color);
  opacity: 0.6;
}
/* ===========================
   入力欄サイズ
=========================== */
.siteNameInput {
  width: 200px;
  margin-right: 6px;
}
.siteUrlInput {
  width: 420px;
}

/* ===========================
   通知（トースト）
=========================== */
#toastContainer {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;
}

.toast {
  background: var(--toast-bg);
  color: #fff;
  padding: 10px 16px;
  margin-top: 10px;
  border-radius: 6px;
  border: 1px solid var(--border-color);
}
.toast.fade-out {
  opacity: 0;
}
</style>
</head>
<body>
<div id="toastContainer"></div>

<h1>まとめサイト 最新記事一覧</h1>
<button id="toggleSettings">設定を開く</button>

<div id="settingsBox">
  <h2>設定</h2>
  <div id="settingsBox">
    <h3>表示設定</h3>
    <label>テーマ：
      <select id="themeSelect" onchange="changeTheme(this.value)">
        <option value="default">ダーク（青）</option>
        <option value="theme-green">ダーク（緑）</option>
        <option value="theme-red">ダーク（赤）</option>
        <option value="theme-light">ライトモード</option>
      </select>
    </label>
  </div>
  表示件数一括設定：
  <select id="limit">
    <option value="5">5件</option>
    <option value="10">10件</option>
    <option value="20">20件</option>
    <option value="50">50件</option>
  </select>

  <button id="saveSettings" onclick="applyBulkLimit()">適用</button>

  <h3>サイト追加（サイトURLからRSS自動取得）</h3>
  <div id="urlDropArea" class="drop-area" style="margin-top:10px;">
    <input id="newSiteName" class="siteNameInput" placeholder="サイト名（空欄で自動取得）">
    <input id="newSiteUrl" class="siteUrlInput" placeholder="サイトURLまたはRSS URL入力">
    <button id="addSite">追加</button>
    <div class="import-desc">URL をドラッグして追加できます</div>
  </div>
  <h3>設定のインポート/エクスポート</h3>
  <div id="dropArea" class="drop-area" style="margin-top:10px;">
    <input type="file" id="importSettings" accept="application/json" style="display:none">
    <button id="importButton">設定をインポート</button>
    <button id="exportSettings">設定をエクスポート</button>
    <div class="import-desc">クリックまたは JSON ファイルをドラッグしてインポート</div>
  </div>

  <div style="margin-top:10px;">
    <button id="resetSettings">リセット</button>
  </div>
</div>
<div style="margin-top:10px;">
<button id="toggleSort">並び替え</button>
</div>
<div id="sites" style="margin-top:10px;"></div>

<script>
// ▼ デフォルトサイト
const defaultSites = [
  { name: "GIGAZINE", rss: "https://gigazine.net/", limit: 10 }
];

function showToast(message, duration = 2000) {
  const container = document.getElementById("toastContainer");

  const toast = document.createElement("div");
  toast.className = "toast";
  toast.textContent = message;

  container.appendChild(toast);

  // 指定時間後にフェードアウト
  setTimeout(() => {
    toast.classList.add("fade-out");

    // フェードアウト後に DOM から削除
    setTimeout(() => {
      toast.remove();
    }, 800); // CSS の transition と合わせる
  }, duration);
}

// ▼ localStorage から読み込み
let settings = JSON.parse(localStorage.getItem("rss_settings")) || {
  limit: 10,
  sites: JSON.parse(JSON.stringify(defaultSites)),
  theme: 'default'
};

// ▼ UI に反映
document.getElementById("limit").value = settings.limit;
applySavedTheme();

// ▼ 設定保存
function saveSettings() {
  localStorage.setItem("rss_settings", JSON.stringify(settings));
}

function applyBulkLimit() {
  const v = Number(document.getElementById("limit").value);

  // デフォルト値を更新
  settings.limit = v;

  // 既存サイトにも適用
  settings.sites.forEach(site => {
    site.limit = v;
  });

  saveSettings();
  main(); // 再描画
}
document.getElementById("saveSettings").onclick = applyBulkLimit;

function changeTheme(themeName) {
  // 1. bodyに付いている "theme-" で始まるクラスをすべて抽出して削除する
  const currentClasses = Array.from(document.body.classList);
  currentClasses.forEach(cls => {
    if (cls.startsWith('theme-')) {
      document.body.classList.remove(cls);
    }
  });

  // 2. 選択されたテーマが 'default'（青）以外なら、新しいクラスを付与
  if (themeName && themeName !== 'default') {
    document.body.classList.add(themeName);
  }

  // 3. 設定を保存して永続化（既存の保存処理）
  settings.theme = themeName;
  saveSettings();
}

// ページ読み込み時（main関数や初期化処理）に実行
function applySavedTheme() {
  const savedTheme = settings.theme || 'default';
  document.getElementById('themeSelect').value = savedTheme;
  changeTheme(savedTheme);
}

/**
 * 汎用ドロップエリア初期化
 * @param {HTMLElement} area - ドロップエリアの要素
 * @param {Function} onDropData - ドロップ時の処理（引数に data を渡す）
 * @param {Function} canHighlight - ハイライトしてよいか判定する関数
 */
function setupDropArea(area, onDropData, canHighlight) {

  area.addEventListener("dragover", (e) => {
    e.preventDefault();
    const items = e.dataTransfer.items;

    if (items && items.length > 0 && canHighlight(items[0])) {
      area.classList.add("dragover");
    }
  });

  area.addEventListener("dragleave", () => {
    area.classList.remove("dragover");
  });

  area.addEventListener("drop", (e) => {
    e.preventDefault();
    area.classList.remove("dragover");

    onDropData(e);
  });
}
setupDropArea(
  document.getElementById("dropArea"),
  (e) => {
    const dt = e.dataTransfer;
    if (!dt.files || dt.files.length === 0) return;

    const ok = confirm("設定をインポートしますか？");
    if (!ok) return;

    importFromFile(dt.files[0]);
  },
  (item) => item.kind === "file"
);
setupDropArea(
  document.getElementById("urlDropArea"),
  async (e) => {
    const text = e.dataTransfer.getData("text");
    if (!text) return;

    document.getElementById("newSiteUrl").value = text;

    const result = await addSiteCore(text);

    if (result.ok) {
      showToast(`${result.name} を追加しました`);
      return;
    }

    // ▼ 失敗時の詳細メッセージ
    switch (result.reason) {
      case "duplicate":
        showToast("このサイトはすでに登録されています");
        break;

      case "fetch-failed":
        showToast("RSS を取得できませんでした（アクセス不可）");
        break;

      case "invalid-rss":
        showToast("RSS の形式が不正です（item/entry が見つかりません）");
        break;

      default:
        showToast("追加に失敗しました");
        break;
    }
  },
  (item) => item.kind === "string"
);

// ▼ サイト追加
async function addSiteCore(url, name = "") {
  if (!url) return { ok: false, reason: "no-url" };

  // 重複チェック
  if (settings.sites.some(s => s.rss === url)) {
    return { ok: false, reason: "duplicate" };
  }

  // RSS 取得
  const result = await fetchAndValidateRSS(url);
  if (!result.ok) {
    return { ok: false, reason: "fetch-failed" };
  }

  // XML 判定
  const xml = new DOMParser().parseFromString(result.xml, "application/xml");
  const isValid =
    xml.querySelector("item") ||
    xml.querySelector("entry") ||
    xml.querySelector("rdf\\:li");

  if (!isValid) { 
    return { ok: false, reason: "invalid-rss" };
  }

  // 名前自動取得
  if (!name) {
    name =
      xml.querySelector("title")?.textContent?.trim() ||
      xml.querySelector("channel > title")?.textContent?.trim() ||
      xml.querySelector("feed > title")?.textContent?.trim() ||
      "名称未設定サイト";
  }

  // 追加
  settings.sites.unshift({ name, rss: url, limit: settings.limit });
  saveSettings();
  main();

  return { ok: true, name: String(name), url };
}
document.getElementById("addSite").onclick = async () => {
  const name = document.getElementById("newSiteName").value;
  const url = document.getElementById("newSiteUrl").value;

  if (!url) {
    showToast("URL を入力してください");
    return;
  }

  const result = await addSiteCore(url, name);

  if (!result.ok) {
    if (result.reason === "duplicate") showToast("このサイトはすでに登録されています");
    else showToast("RSS を取得できませんでした");
    return;
  }

  // 成功時
  document.getElementById("newSiteUrl").value = "";
  document.getElementById("newSiteName").value = "";
  showToast(`${result.name}を追加しました`);
};

// ▼ エクスポート
document.getElementById("exportSettings").onclick = () => {
  const data = JSON.stringify(settings, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);

  // ★ 日付を付けたファイル名を生成
  const now = new Date();
  const yyyy = now.getFullYear();
  const mm = String(now.getMonth() + 1).padStart(2, "0");
  const dd = String(now.getDate()).padStart(2, "0");
  const hh = String(now.getHours()).padStart(2, "0");
  const mi = String(now.getMinutes()).padStart(2, "0");
  const fileName = `rss-settings-${yyyy}${mm}${dd}-${hh}${mi}.json`;

  const a = document.createElement("a");
  a.href = url;
  a.download = fileName;   // ★ ここに日付入りファイル名をセット
  a.click();

  URL.revokeObjectURL(url);
};
// ▼ クリックでファイル選択
const importButton = document.getElementById("importButton");
const importInput = document.getElementById("importSettings");
importButton.onclick = () => importInput.click();
importInput.onchange = () => {
  if (importInput.files[0]) importFromFile(importInput.files[0]);
};

function importFromFile(file) {
  const reader = new FileReader();

  reader.onload = () => {
    const text = reader.result.trim();

    // ▼ URL羅列なら例外的に通す
    if (!text.startsWith("{")) {
      const urls = text
        .split(/\r?\n/)
        .map(v => v.trim())
        .filter(v => v.startsWith("http"));

      if (urls.length === 0) {
        alert("URL の羅列でも JSON でもありません");
        return;
      }

      settings.sites = urls.map(url => ({
        name: url,
        rss: url,
        limit: settings.limit
      }));

      localStorage.setItem("rss_settings", JSON.stringify(settings));
      main();
      alert("設定をインポートしました（URLリスト）");
      return;
    }

    // ▼ JSON の場合
    try {
      const imported = JSON.parse(text);

      if (!imported.sites || !Array.isArray(imported.sites)) {
        alert("設定ファイルが不正です");
        return;
      }

      imported.sites = imported.sites
        .filter(s => s.rss)
        .map(s => ({
          name: s.name ?? s.rss,
          rss: s.rss,
          limit: s.limit ?? settings.limit
        }));

      if (imported.sites.length === 0) {
        alert("有効な RSS URL がありません");
        return;
      }

      settings = imported;
      localStorage.setItem("rss_settings", JSON.stringify(settings));
      main();
      alert("設定をインポートしました");

    } catch {
      alert("JSON の解析に失敗しました");
    }
  };

  reader.readAsText(file);
}

// ▼ リセット
document.getElementById("resetSettings").onclick = () => {
  const ok = confirm("設定を初期化します。よろしいですか？\n（登録したサイトはすべて削除されます）");
  if (!ok) return;
  localStorage.removeItem("rss_settings");
  settings = {
    limit: 10,
    sites: JSON.parse(JSON.stringify(defaultSites)) // ← 深いコピー
  };
  main();
};

// ▼ 設定開閉
const toggleBtn = document.getElementById("toggleSettings");
const settingsBox = document.getElementById("settingsBox");
settingsBox.style.display = "none";
toggleBtn.textContent = "設定を開く";
toggleBtn.onclick = () => {
  const isOpen = window.getComputedStyle(settingsBox).display !== "none";

  // ▼ 開閉切り替え
  settingsBox.style.display = isOpen ? "none" : "block";

  // ▼ ボタンのテキスト切り替え
  toggleBtn.textContent = isOpen ? "設定を開く" : "設定を閉じる";
};

// ▼ Cloudflare Worker
async function fetchViaCloudflare(url) {
  //const api = "http://localhost:8787/?url=";
  const api = "https://rss-proxy.watashigyuudondesu.workers.dev/?url=";
  const res = await fetch(api + encodeURIComponent(url));
  return await res.text();
}

async function fetchAndValidateRSS(url) {
  let xmlText = "";

  try {
    xmlText = await fetchViaCloudflare(url);
  } catch (e) {
    return { ok: false, xml: "", reason: "fetch-error" };
  }

  const hasItem =
    xmlText.includes("<item") ||
    xmlText.includes("<entry") ||
    xmlText.includes("rdf:li");

  if (!hasItem) {
    return { ok: false, xml: xmlText, reason: "no-item" };
  }

  return { ok: true, xml: xmlText };
}
// ▼ 個別 limit 更新
function updateSiteLimit(index, value) {
  const site = settings.sites[index];

  const min = 1;
  const max = site._maxItems ?? site.limit ?? 1;

  let v = Number(value);
  if (v < min) v = min;
  if (v > max) v = max;

  site.limit = v;

  localStorage.setItem("rss_settings", JSON.stringify(settings));
  main();
}

// タイトル編集ボタンから直接呼ばれる関数
function editTitle(index) {
  const site = settings.sites[index];
  if (!site) return;

  const newTitle = prompt("タイトルを編集", site.name);

  if (newTitle && newTitle.trim() !== "") {
    site.name = newTitle.trim();
    saveSettings();
    main(); // 再描画して反映
  }
}

/* ============================
   マウスドラッグ並び替え
============================ */
function enableMouseSort(container, onSorted) {
  let dragging = null;
  let placeholder = document.createElement("div");
  placeholder.className = "placeholder";

  let offsetX = 0;
  let offsetY = 0;

  container.onpointerdown = e => {
    // すでに他の指でドラッグ中、またはボタン・入力欄の上なら無視
    if (dragging) return;
    const ignoreSelectors = [".deleteBtn", ".limitInput", ".customSpinner", ".customSpinner *", ".edit-title", ".edit-title *"];
    if (ignoreSelectors.some(sel => e.target.matches(sel))) return;

    const target = e.target.closest(".draggable");
    if (!target) return;

    // 即座にドラッグ開始
    dragging = target;
    dragging.setPointerCapture(e.pointerId);

    // テキスト選択を禁止するクラスを付与
    document.body.classList.add("sorting-active");

    const rect = dragging.getBoundingClientRect();
    const scrollX = window.pageXOffset || document.documentElement.scrollLeft;
    const scrollY = window.pageYOffset || document.documentElement.scrollTop;

    // 掴んだ場所のオフセットを計算
    offsetX = e.pageX - (rect.left + scrollX);
    offsetY = e.pageY - (rect.top + scrollY);

    // プレースホルダーの準備
    placeholder.style.height = rect.height + "px";
    placeholder.style.width = rect.width + "px";
    placeholder.style.marginBottom = window.getComputedStyle(dragging).marginBottom;

    // ドラッグ中のスタイル設定
    dragging.classList.add("dragging");
    dragging.style.position = "absolute";
    dragging.style.width = rect.width + "px";
    dragging.style.zIndex = "1000";
    
    // 即座に位置を反映
    dragging.style.left = (e.pageX - offsetX) + "px";
    dragging.style.top = (e.pageY - offsetY) + "px";

    container.insertBefore(placeholder, dragging.nextSibling);

    const move = e2 => {
      if (!dragging || e2.pointerId !== e.pointerId) return;

      dragging.style.left = (e2.pageX - offsetX) + "px";
      dragging.style.top = (e2.pageY - offsetY) + "px";

      const items = [...container.querySelectorAll(".draggable:not(.dragging)")];
      const y = e2.clientY;

      let after = items.find(item => {
        const r = item.getBoundingClientRect();
        return y < r.top + r.height / 2;
      });

      if (after) container.insertBefore(placeholder, after);
      else container.appendChild(placeholder);
    };

    const up = e2 => {
      if (!dragging || e2.pointerId !== e.pointerId) return;
      
      dragging.releasePointerCapture(e2.pointerId);
      document.body.classList.remove("sorting-active");

      dragging.classList.remove("dragging");
      dragging.style.cssText = ""; 
      container.insertBefore(dragging, placeholder);
      placeholder.remove();

      dragging = null;
      if (onSorted) onSorted();

      document.removeEventListener("pointermove", move);
      document.removeEventListener("pointerup", up);
    };

    document.addEventListener("pointermove", move);
    document.addEventListener("pointerup", up);
  };
}
/* ============================
   並び替えモード
============================ */
let sortMode = false;
document.getElementById("toggleSort").onclick = () => {
  sortMode = !sortMode;
  main();
};
/* ============================
   並び替えモードの描画
============================ */
function renderSortMode() {
  const box = document.getElementById("sites");
  box.innerHTML = "<h2>サイトの順番を変更</h2>";

  const list = document.createElement("div");
  list.id = "sortList";

  settings.sites.forEach((s, i) => {
    const row = document.createElement("div");
    row.className = "draggable";
    row.dataset.index = i;

    // ✎ボタンに onclick="editTitle(${i})" を追加
    const editBtnHtml = `<button class="edit-title" onclick="editTitle(${i})">✎</button>`;

    if (s.error) {
      row.innerHTML = `
        <strong class="sortTitle">≡ ${s.name}</strong>
        ${editBtnHtml}
        <div class="errorWrapper">　</div>
        <button class="deleteBtn" onclick="deleteSite(this.closest('.draggable').dataset.index)">✕</button>
      `;
    } else {
      row.innerHTML = `
        <strong class="sortTitle">≡ ${s.name}</strong>
        ${editBtnHtml}
        <div class="numberWrapper">
          <input type="number" class="limitInput"
            value="${s.limit}" min="1" max="${s._maxItems}"
            onchange="updateSiteLimit(this.closest('.draggable').dataset.index, this.value)">
          <div class="customSpinner">
            <button data-dir="up">▲</button>
            <button data-dir="down">▼</button>
          </div>
        </div>
        <button class="deleteBtn" onclick="deleteSite(this.closest('.draggable').dataset.index)">✕</button>
      `;
    }
    list.appendChild(row);
  });

  box.appendChild(list);

  enableMouseSort(list, () => {
    const items = [...list.querySelectorAll(".draggable")];
    settings.sites = items.map(item => settings.sites[Number(item.dataset.index)]);
    saveSettings();
    items.forEach((item, idx) => item.dataset.index = idx);
  });
}
// ▼ RSS 読み込み
async function loadLatest(site, index) {
  const result = await fetchAndValidateRSS(site.rss);

  if (!result.ok) {
    site.error = true;
    return `
      <div class="site">
        <div class="siteHeader">
          <h2>
            <a href="${site.rss.replace(/\/[^/]*$/, "")}" target="_blank">${site.name}</a>
          </h2>
          <button class="edit-title">✎</button>
          <button class="deleteBtn" onclick="deleteSite(${index})">✕</button>
        </div>
        取得できませんでした。
      </div>`;
  }
  site.error = false;

  const xml = new DOMParser().parseFromString(result.xml, "application/xml");
  
  let items = [
    ...xml.getElementsByTagName("item"),
    ...xml.getElementsByTagName("entry")
  ];

  // RDF の場合
  if (items.length === 0) {
    const links = [...xml.getElementsByTagName("rdf:li")].map(li =>
      li.getAttribute("rdf:resource")
    );

    items = links.map(link => {
      const itemNode = xml.querySelector(`item[rdf\\:about="${link}"]`);
      const title = itemNode?.querySelector("title")?.textContent ?? link;
      const date = itemNode?.querySelector("dc\\:date")?.textContent || null;
      return { title, link, date };
    });
  } else {
    items = items.map(item => {
      const title = item.querySelector("title")?.textContent ?? "タイトルなし";
      const link =
        item.querySelector("link")?.textContent?.trim() ||
        item.querySelector("link")?.getAttribute("href") ||
        item.querySelector("guid")?.textContent?.trim() ||
        item.getAttribute("rdf:about") ||
        "#";

      const pubDate =
        item.querySelector("pubDate")?.textContent ||
        item.querySelector("dc\\:date")?.textContent ||
        item.querySelector("updated")?.textContent ||
        item.querySelector("published")?.textContent ||
        item.querySelector("date")?.textContent;

      return { title, link, date: pubDate };
    });
  }

  // ★ サイトの最大件数を取得
  const limit = applyLimitBounds(site, items);

  const limitedItems = items.slice(0, limit);

  let html = `
    <div class="site">
      <div class="siteHeader">
        <h2>
          <a href="${site.rss.replace(/\/[^/]*$/, "")}" target="_blank">${site.name}</a>
        </h2>
        <button class="edit-title" onclick="editTitle(${index})">✎</button>
        <div class="numberWrapper">
          <input type="number" class="limitInput"
            value="${site.limit}" min="1" max="${site._maxItems}"
            onchange="updateSiteLimit(${index}, this.value)">
          <div class="customSpinner">
            <button data-dir="up">▲</button>
            <button data-dir="down">▼</button>
          </div>
        </div>
        <button class="deleteBtn" onclick="deleteSite(${index})">✕</button>
      </div>
      <ul>
  `;

  for (const item of limitedItems) {
    const dateText = item.date ? new Date(item.date).toLocaleString() : "日付なし";
    html += `
      <li>
        <a href="${item.link}" target="_blank">${item.title}</a><br>
        <span class="date">（${dateText}）</span>
      </li>
    `;
  }

  html += `</ul></div>`;
  return html;
}

function applyLimitBounds(site, items) {
  const maxItems = items.length;

  if (site.limit > maxItems) {
    site.limit = maxItems;
    saveSettings();
  }

  site._maxItems = maxItems;
  return site.limit;
}

// ▼ サイト削除
function deleteSite(index) {
  settings.sites.splice(index, 1);
  saveSettings();
  main();
}
function attachCustomSpinnerEvents() {
  document.querySelectorAll(".customSpinner button").forEach(btn => {
    btn.addEventListener("click", e => {
      const dir = e.target.dataset.dir;
      const wrapper = e.target.closest(".numberWrapper");
      const input = wrapper.querySelector(".limitInput");

      const min = Number(input.min) || 1;
      const max = Number(input.max) || Infinity;

      let val = Number(input.value);

      if (dir === "up") val = Math.min(val + 1, max);
      if (dir === "down") val = Math.max(val - 1, min);

      input.value = val;
      input.dispatchEvent(new Event("change"));
    });
  });
}


// ▼ メイン
async function main() {
  const btn = document.getElementById("toggleSort");
  if (sortMode) {
    btn.textContent = "通常表示に戻る";
    renderSortMode();
    attachCustomSpinnerEvents();
    return;
  }
  btn.textContent = "並び替えリスト表示";
  const results = await Promise.all(
    settings.sites.map((site, index) => loadLatest(site, index))
  );

  document.getElementById("sites").innerHTML = results.join("");
  attachCustomSpinnerEvents();
}
main();
</script>
