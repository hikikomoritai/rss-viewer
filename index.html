<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>まとめサイト 最新記事一覧（10件）</title>
<style>
body {
  font-family: sans-serif;
  margin: 20px;
  background-color: #121212;   /* 背景を黒に近いグレー */
  color: #e0e0e0;              /* 文字色を明るいグレー */
}

h1 {
  font-size: 24px;
  color: #ffffff;              /* 見出しは白 */
}

.site {
  margin-bottom: 30px;
  background: #1e1e1e;         /* 各サイト枠の背景 */
  padding: 15px;
  border-radius: 8px;
  border: 1px solid #333;      /* 薄い枠線 */
}

.site h2 {
  margin-bottom: 5px;
}

.site h2 a {
  color: #80cbc4;              /* サイト名リンクの色（青緑） */
  text-decoration: none;
}

.site h2 a:hover {
  text-decoration: underline;
}

ul {
  margin-top: 5px;
}

li a {
  color: #90caf9;              /* 記事リンクの色（淡い青） */
  text-decoration: none;
}

li a:hover {
  text-decoration: underline;
}

span {
  color: #aaaaaa;              /* 日付の色 */
}

</style>
</head>
<body>

<h1>まとめサイト 最新記事一覧（10件）</h1>

<div id="sites"></div>

<script>
// ▼ サイト一覧
const sites = [
  { name: "痛いニュース(ﾉ∀`)", rss: "https://itainews.com/index.rdf" },
  { name: "【2ch】ニュー速クオリティ", rss: "http://news4vip.livedoor.biz/index.rdf" },
  { name: "カナ速", rss: "http://kanasoku.info/index.rdf" },
  { name: "VIPPERな俺", rss: "http://blog.livedoor.jp/news23vip/index.rdf" },
  { name: "無題のドキュメント", rss: "https://mute-sound-848f.watashigyuudondesu.workers.dev/?site=mudaino" },
  { name: "IT速報", rss: "http://blog.livedoor.jp/itsoku/index.rdf" },
  { name: "ニッチなPCゲーマーの環境構築Z", rss: "https://www.nichepcgamer.com/feed" },
  { name: "はちま起稿", rss: "http://blog.esuteru.com/index.rdf" },
  { name: "オレ的ゲーム速報＠刃", rss: "https://jin115.com/index.rdf" },
  { name: "GIGAGINE", rss: "https://gigazine.net/news/rss_2.0" },
  { name: "Game*Spark", rss: "https://www.gamespark.jp/rss/index.rdf" },
  { name: "北森瓦版", rss: "https://northwood.blog.fc2.com/?xml" },
  { name: "Mogura VR", rss: "https://www.moguravr.com/feed" },
  { name: "超・マンガ速報", rss: "https://chomangasokuho.blog.jp/index.rdf" },
  { name: "あにまんch", rss: "https://animanch.com/feed" },
  { name: "エルミタージュ秋葉原", rss: "https://www.gdm.or.jp/feed" },
  { name: "汎用型自作PCまとめ", rss: "http://www.jisaka.com/index.rdf" }
];

// ▼ Cloudflare Workers 経由で取得
async function fetchViaCloudflare(url) {
  const api = "https://summer-truth-854e.watashigyuudondesu.workers.dev/?v=2&url=";
  const res = await fetch(api + encodeURIComponent(url));
  if (!res.ok) throw new Error("fetch failed");
  return await res.text();
}


// ▼ XML/RDF/Atom 自動判定
async function loadLatest(site) {
  let xmlText = await fetchViaCloudflare(site.rss);


  // RSS が壊れている場合は即終了
  if (!xmlText.includes("<item") &&
      !xmlText.includes("<entry") &&
      !xmlText.includes("rdf:li")) {
    return `<div class="site"><h2>${site.name}</h2>最新記事を取得できませんでした。</div>`;
  }

  const xml = new DOMParser().parseFromString(xmlText, "text/xml");

  // ▼ RSS2.0 / Atom / RDF すべて対応
  let items = [...xml.querySelectorAll("item, entry")];

// RDF の場合
if (items.length === 0) {
  const links = [...xml.getElementsByTagName("rdf:li")].map(li =>
    li.getAttribute("rdf:resource")
  );

  items = links.map(link => {
    // RDF の item ノードを探す
    const itemNode = xml.querySelector(`item[rdf\\:about="${link}"]`);

    const title =
      itemNode?.querySelector("title")?.textContent ??
      link;

    const date =
      itemNode?.querySelector("dc\\:date")?.textContent ||
      itemNode?.querySelector("date")?.textContent ||
      null;

    return { title, link, date };
  }).slice(0, 10);
} else {
    items = items.slice(0, 10).map(item => {
      const title = item.querySelector("title")?.textContent ?? "タイトルなし";

const link =
  item.querySelector("link")?.textContent?.trim() ||
  item.querySelector("link")?.getAttribute("href") ||
  item.querySelector("guid")?.textContent?.trim() ||
  item.getAttribute("rdf:about") ||
  "#";


      // ▼ 日付タグを全網羅（RSS2.0 / Atom / RDF）
      const pubDate =
        item.querySelector("pubDate")?.textContent ||
        item.querySelector("dc\\:date")?.textContent ||
        item.querySelector("updated")?.textContent ||
        item.getElementsByTagName("updated")[0]?.textContent ||   // ← Atom namespace対応
        item.querySelector("published")?.textContent ||
        item.getElementsByTagName("published")[0]?.textContent || // ← Atom namespace対応
        item.querySelector("date")?.textContent ||
        item.querySelector("created")?.textContent ||
        item.querySelector("modified")?.textContent;
      

      return { title, link, date: pubDate };
    });
  }

  const siteUrl = site.rss.replace(/\/[^/]*$/, "");
  let html = `<div class="site"><h2><a href="${siteUrl}" target="_blank">${site.name}</a></h2><ul>`;

  for (const item of items) {
    const dateText = item.date ? new Date(item.date).toLocaleString() : "日付なし";
    html += `
      <li>
        <a href="${item.link}" target="_blank">${item.title}</a><br>
        <span class="date">（${dateText}）</span>
      </li>
    `;

  }

  html += "</ul></div>";
  return html;
}

// ▼ 並列処理で高速化
async function main() {
  const results = await Promise.all(sites.map(loadLatest));
  document.getElementById("sites").innerHTML = results.join("");
}

main();
</script>

</body>
</html>
