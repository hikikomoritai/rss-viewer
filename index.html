
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>まとめサイト 最新記事一覧（カスタム版）</title>
<style>
body {
  font-family: sans-serif;
  margin: 20px;
  background-color: #121212;
  color: #e0e0e0;
}

h1 {
  font-size: 24px;
  color: #ffffff;
}

.site {
  margin-bottom: 30px;
  background: #1e1e1e;
  padding: 15px;
  border-radius: 8px;
  border: 1px solid #333;
}

.site h2 a {
  color: #80cbc4;
  text-decoration: none;
}

.site h2 a:hover {
  text-decoration: underline;
}

li a {
  color: #90caf9;
  text-decoration: none;
}

li a:hover {
  text-decoration: underline;
}

span.date {
  color: #aaaaaa;
}

#settingsBox {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 8px;
  border: 1px solid #333;
  margin-bottom: 20px;
  display: none;
}

.draggable {
  cursor: grab;
  padding: 6px;
  border: 1px solid #444;
  margin-bottom: 6px;
  background: #222;
  border-radius: 6px;
  touch-action: none;
}
.dragging {
  opacity: 0.5;
}
.placeholder {
  background: #333;
  border: 1px dashed #666;
  margin-bottom: 6px;
  border-radius: 6px;
  padding: 6px;
}
button {
  background: #224a8b;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}

button:hover {
  background: #2563eb;
}

button:active {
  background: #456bd4;
}
input {
  background: #1f2937;
  color: #f3f4f6;
  border: 1px solid #4b5563;
  padding: 6px 6px;
  border-radius: 6px;
  font-size: 16px;
}

input:focus {
  outline: none;
  border-color: #3b82f6;
  box-shadow: 0 0 4px #3b82f6;
}
select {
  background: #1f2937;
  color: #f3f4f6;
  border: 1px solid #4b5563;
  padding: 6px 6px;
  border-radius: 6px;
  appearance: none;         /* ブラウザ標準の矢印を消す */
  font-size: 16px;
}

select:focus {
  outline: none;
  border-color: #3b82f6;
  box-shadow: 0 0 4px #3b82f6;
}
.limitInput {
  text-align: center;
  background: #1f2937;
  color: #f3f4f6;
  border: 1px solid #4b5563;
  padding: 6px 1px;
  border-radius: 6px;
  font-size: 16px;
  width: 40px;
}
/* 標準の ▲▼ を消す */
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

.numberWrapper {
  position: relative;
  display: inline-flex;
  align-items: center;
}
.errorWrapper {
  height: 32px;
  position: relative;
  display: inline-flex;
  align-items: center;
}
.customSpinner {
  display: flex;
  flex-direction: column;
  margin-left: 4px;
  gap: 2px;
}

.customSpinner button {
  width: 20px;
  height: 16px;
  font-size: 12px;
  padding: 0;
}
.siteHeader {
  display: flex;
  align-items: center;
  gap: 12px;
}

.siteHeader h2 {
  margin: 0;
}
.site {
  position: relative;
}
.deleteBtn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #a12f2f;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
}

.deleteBtn:hover {
  background: #dc2626;
}
.draggable {
  position: relative;
  padding: 8px;
  border: 1px solid #444;
  margin-bottom: 6px;
  background: #1f2937;
  border-radius: 6px;
}
.siteNameInput {
  width: 200px;
  margin-right: 6px;
}
.siteUrlInput {
  width: 420px;
}
.sortTitle {
  font-size: 20px;
}
</style>
</head>
<body>

<h1>まとめサイト 最新記事一覧（カスタム版）</h1>
<button id="toggleSettings">設定を開く/閉じる</button>

<div id="settingsBox">
  <h2>設定</h2>

  表示件数一括設定：
  <select id="limit">
    <option value="5">5件</option>
    <option value="10">10件</option>
    <option value="20">20件</option>
    <option value="50">50件</option>
  </select>

  <button id="saveSettings" onclick="applyBulkLimit()">適用</button>


  <h3>サイト追加（サイトURLからRSS自動取得）</h3>
  <input id="newSiteName" class="siteNameInput" placeholder="サイト名（空欄で自動取得）">
  <input id="newSiteUrl" class="siteUrlInput" placeholder="サイトURLまたはRSS URL入力（例：https://xxx.xxx/）">
  <button id="addSite">追加</button>
  <div style="margin-top:10px;">
  <button id="toggleSort">並び替え</button>
  </div>
  <div style="margin-top:10px;">
    <button id="exportSettings">設定をエクスポート</button>
  </div>

  <div style="margin-top:10px;">
    <input type="file" id="importSettings" style="display:none">
    <button id="importButton">設定をインポート</button>
  </div>

  <div style="margin-top:10px;">
    <button id="resetSettings">リセット</button>
  </div>
</div>

<div id="sites"></div>

<script>
// ▼ デフォルトサイト
const defaultSites = [
  { name: "GIGAZINE", rss: "https://gigazine.net/", limit: 10 }
];

// ▼ localStorage から読み込み
let settings = JSON.parse(localStorage.getItem("rss_settings")) || {
  limit: 10,
  sites: JSON.parse(JSON.stringify(defaultSites))
};


// ▼ UI に反映
document.getElementById("limit").value = settings.limit;

// ▼ 設定保存
function saveSettings() {
  localStorage.setItem("rss_settings", JSON.stringify(settings));
}


function applyBulkLimit() {
  const v = Number(document.getElementById("limit").value);

  // デフォルト値を更新
  settings.limit = v;

  // 既存サイトにも適用
  settings.sites.forEach(site => {
    site.limit = v;
  });

  saveSettings();
  main(); // 再描画
}

document.getElementById("saveSettings").onclick = applyBulkLimit;

// ▼ サイト追加
document.getElementById("addSite").onclick = async () => {
  let name = document.getElementById("newSiteName").value;
  const url = document.getElementById("newSiteUrl").value;

  if (!url) {
    alert("URL を入力してください");
    return;
  }

  if (settings.sites.some(s => s.rss === url)) {
    alert("このサイトはすでに登録されています");
    return;
  }

  const result = await fetchAndValidateRSS(url);
  if (!result.ok) {
    alert("RSS を取得できませんでした");
    return;
  }

  const xml = new DOMParser().parseFromString(result.xml, "application/xml");
  const isValid =
    xml.querySelector("item") ||
    xml.querySelector("entry") ||
    xml.querySelector("rdf\\:li");

  if (!isValid) {
    alert("RSS を取得できませんでした");
    return;
  }

  if (!name) {
    name =
      xml.querySelector("title")?.textContent?.trim() ||
      xml.querySelector("channel > title")?.textContent?.trim() ||
      xml.querySelector("feed > title")?.textContent?.trim() ||
      "名称未設定サイト";
  }

  settings.sites.unshift({ name, rss: url, limit: settings.limit });
  document.getElementById("newSiteUrl").value = "";
  document.getElementById("newSiteName").value = "";
  saveSettings();
  main();
  alert("サイトを追加しました");
};
/* ============================
   並び替えモード
============================ */
let sortMode = false;

document.getElementById("toggleSort").onclick = () => {
  sortMode = !sortMode;
  main();
};
// ▼ エクスポート
document.getElementById("exportSettings").onclick = () => {
  const data = JSON.stringify(settings, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);

  // ★ 日付を付けたファイル名を生成
  const now = new Date();
  const yyyy = now.getFullYear();
  const mm = String(now.getMonth() + 1).padStart(2, "0");
  const dd = String(now.getDate()).padStart(2, "0");
  const hh = String(now.getHours()).padStart(2, "0");
  const mi = String(now.getMinutes()).padStart(2, "0");
  const fileName = `rss-settings-${yyyy}${mm}${dd}-${hh}${mi}.json`;

  const a = document.createElement("a");
  a.href = url;
  a.download = fileName;   // ★ ここに日付入りファイル名をセット
  a.click();

  URL.revokeObjectURL(url);
};

// ▼ インポート
document.getElementById("importButton").onclick = () => {
  document.getElementById("importSettings").click();
};

document.getElementById("importSettings").onchange = (event) => {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    try {
      const imported = JSON.parse(reader.result);
      if (!imported.sites || !Array.isArray(imported.sites)) {
        alert("設定ファイルが不正です");
        return;
      }
      settings = imported;
      localStorage.setItem("rss_settings", JSON.stringify(settings));
      main();
      alert("設定をインポートしました");
    } catch (e) {
      alert("設定ファイルの読み込みに失敗しました");
    }
  };
  reader.readAsText(file);
};

// ▼ リセット
document.getElementById("resetSettings").onclick = () => {
  localStorage.removeItem("rss_settings");
  settings = {
    limit: 10,
    sites: JSON.parse(JSON.stringify(defaultSites)) // ← 深いコピー
  };
  main();
};


// ▼ 設定開閉
document.getElementById("toggleSettings").onclick = () => {
  const box = document.getElementById("settingsBox");
  const current = window.getComputedStyle(box).display;
  box.style.display = current === "none" ? "block" : "none";
};

// ▼ Cloudflare Worker
async function fetchViaCloudflare(url) {
  const api = "http://localhost:8787/?url=";
  //const api = "https://rss-proxy.watashigyuudondesu.workers.dev/?url=";
  const res = await fetch(api + encodeURIComponent(url));
  return await res.text();
}

async function fetchAndValidateRSS(url) {
  let xmlText = "";

  try {
    xmlText = await fetchViaCloudflare(url);
  } catch (e) {
    return { ok: false, xml: "", reason: "fetch-error" };
  }

  const hasItem =
    xmlText.includes("<item") ||
    xmlText.includes("<entry") ||
    xmlText.includes("rdf:li");

  if (!hasItem) {
    return { ok: false, xml: xmlText, reason: "no-item" };
  }

  return { ok: true, xml: xmlText };
}
// ▼ 個別 limit 更新
function updateSiteLimit(index, value) {
  settings.sites[index].limit = Number(value);
  localStorage.setItem("rss_settings", JSON.stringify(settings));
  main();
}


/* ============================
   マウスドラッグ並び替え
============================ */
function enableMouseSort(container, onSorted) {
  let dragging = null;
  let placeholder = document.createElement("div");
  placeholder.className = "placeholder";
  placeholder.style.height = "40px";

  let offsetY = 0;

  container.addEventListener("pointerdown", e => {
    if (e.target.classList.contains("deleteBtn")) {
      e.stopPropagation();
      return;
    }
    if (e.target.classList.contains("limitInput")) {
      e.stopPropagation();
      return;
    }
    if (e.target.matches(".customSpinner, .customSpinner *")) {
      e.stopPropagation();
      return;
    }
    const target = e.target.closest(".draggable");
    if (!target) return;

    dragging = target;
    dragging.setPointerCapture(e.pointerId);

    const rect = dragging.getBoundingClientRect();
    offsetY = e.clientY - rect.top;

    // 浮かせる
    dragging.style.position = "absolute";
    dragging.style.width = rect.width + "px";
    dragging.style.zIndex = 1000;
    dragging.classList.add("dragging");

    // placeholder を置く
    dragging.parentNode.insertBefore(placeholder, dragging.nextSibling);

    moveAt(e.pageY);

    function moveAt(pageY) {
      dragging.style.top = pageY - offsetY + "px";
      dragging.style.left = rect.left + "px";
    }

    const move = e2 => {
      if (!dragging) return;
      moveAt(e2.pageY);

      const items = [...container.querySelectorAll(".draggable:not(.dragging)")];
      const y = e2.clientY;

      let after = items.find(item => {
        const r = item.getBoundingClientRect();
        return y < r.top + r.height / 2;
      });

      if (after) container.insertBefore(placeholder, after);
      else container.appendChild(placeholder);
    };

    const up = e2 => {
      if (!dragging) return;

      dragging.releasePointerCapture(e2.pointerId);

      dragging.style.position = "";
      dragging.style.top = "";
      dragging.style.left = "";
      dragging.style.width = "";
      dragging.style.zIndex = "";
      dragging.classList.remove("dragging");

      container.insertBefore(dragging, placeholder);
      placeholder.remove();

      dragging = null;

      onSorted();
      renderSortMode(); // 並び替えモードの再描画
      document.removeEventListener("pointermove", move);
      document.removeEventListener("pointerup", up);
    };

    document.addEventListener("pointermove", move);
    document.addEventListener("pointerup", up);
  });
}


/* ============================
   並び替えモードの描画
============================ */
function renderSortMode() {
  const box = document.getElementById("sites");
  box.innerHTML = "<h2>サイトの順番を変更</h2>";

  const list = document.createElement("div");
  list.id = "sortList";

  settings.sites.forEach((s, i) => {

    const row = document.createElement("div");
    row.className = "draggable";
    row.dataset.index = i;

    if (s.error) {
      row.innerHTML = `
        <strong class="sortTitle">≡ ${s.name}</strong>
        <div class="errorWrapper">　</div>
        <button class="deleteBtn" onclick="deleteSite(${i})">✕</button>
      `;
    } else {
      row.innerHTML = `
        <strong class="sortTitle">≡ ${s.name}</strong>
        <div class="numberWrapper">
          <input type="number" class="limitInput"
            value="${s.limit}" min="1" max="${s._maxItems}"
            onchange="updateSiteLimit(${i}, this.value)">
          <div class="customSpinner">
            <button data-dir="up">▲</button>
            <button data-dir="down">▼</button>
          </div>
        </div>
        <button class="deleteBtn" onclick="deleteSite(${i})">✕</button>
      `;
    }

    list.appendChild(row);
  });

  box.appendChild(list);

  enableMouseSort(list, () => {
    const items = [...list.querySelectorAll(".draggable")];
    const newOrder = items.map(item => {
      const oldIndex = Number(item.dataset.index);
      return settings.sites[oldIndex];
    });

    settings.sites = newOrder;

    items.forEach((item, idx) => item.dataset.index = idx);

    saveSettings();
  });
}


// ▼ RSS 読み込み
async function loadLatest(site, index) {
  const result = await fetchAndValidateRSS(site.rss);

  if (!result.ok) {
    site.error = true;
    return `
      <div class="site">
        <div class="siteHeader">
          <h2>
            <a href="${site.rss.replace(/\/[^/]*$/, "")}" target="_blank">${site.name}</a>
          </h2>
          <button class="deleteBtn" onclick="deleteSite(${index})">✕</button>
        </div>
        取得できませんでした。
      </div>`;
  }
  site.error = false;

  const xml = new DOMParser().parseFromString(result.xml, "application/xml");
  
  let items = [
    ...xml.getElementsByTagName("item"),
    ...xml.getElementsByTagName("entry")
  ];

  // RDF の場合
  if (items.length === 0) {
    const links = [...xml.getElementsByTagName("rdf:li")].map(li =>
      li.getAttribute("rdf:resource")
    );

    items = links.map(link => {
      const itemNode = xml.querySelector(`item[rdf\\:about="${link}"]`);
      const title = itemNode?.querySelector("title")?.textContent ?? link;
      const date = itemNode?.querySelector("dc\\:date")?.textContent || null;
      return { title, link, date };
    });
  } else {
    items = items.map(item => {
      const title = item.querySelector("title")?.textContent ?? "タイトルなし";
      const link =
        item.querySelector("link")?.textContent?.trim() ||
        item.querySelector("link")?.getAttribute("href") ||
        item.querySelector("guid")?.textContent?.trim() ||
        item.getAttribute("rdf:about") ||
        "#";

      const pubDate =
        item.querySelector("pubDate")?.textContent ||
        item.querySelector("dc\\:date")?.textContent ||
        item.querySelector("updated")?.textContent ||
        item.querySelector("published")?.textContent ||
        item.querySelector("date")?.textContent;

      return { title, link, date: pubDate };
    });
  }

  // ★ サイトの最大件数を取得
  const limit = applyLimitBounds(site, items);

  const limitedItems = items.slice(0, limit);

  let html = `
    <div class="site">
      <div class="siteHeader">
        <h2>
          <a href="${site.rss.replace(/\/[^/]*$/, "")}" target="_blank">${site.name}</a>
        </h2>
        <div class="numberWrapper">
          <input type="number" class="limitInput"
            value="${site.limit}" min="1" max="${site._maxItems}"
            onchange="updateSiteLimit(${index}, this.value)">
          <div class="customSpinner">
            <button data-dir="up">▲</button>
            <button data-dir="down">▼</button>
          </div>
        </div>
        <button class="deleteBtn" onclick="deleteSite(${index})">✕</button>
      </div>
      <ul>
  `;

  for (const item of limitedItems) {
    const dateText = item.date ? new Date(item.date).toLocaleString() : "日付なし";
    html += `
      <li>
        <a href="${item.link}" target="_blank">${item.title}</a><br>
        <span class="date">（${dateText}）</span>
      </li>
    `;
  }

  html += `</ul></div>`;
  return html;
}

function applyLimitBounds(site, items) {
  const maxItems = items.length;

  if (site.limit > maxItems) {
    site.limit = maxItems;
    saveSettings();
  }

  site._maxItems = maxItems;
  return site.limit;
}

// ▼ サイト削除
function deleteSite(index) {
  settings.sites.splice(index, 1);
  saveSettings();
  main();
}
function attachCustomSpinnerEvents() {
  // ▲▼ ボタンで数値変更
  document.querySelectorAll(".customSpinner button").forEach(btn => {
    btn.addEventListener("click", e => {
      const dir = e.target.dataset.dir;
      const wrapper = e.target.closest(".numberWrapper");
      const input = wrapper.querySelector(".limitInput");

      let val = Number(input.value);
      if (dir === "up") val++;
      if (dir === "down") val--;

      input.value = val;
      input.dispatchEvent(new Event("change"));
    });
  });
}

// ▼ メイン
async function main() {
  const btn = document.getElementById("toggleSort");
  if (sortMode) {
    btn.textContent = "通常表示に戻る";
    renderSortMode();
    attachCustomSpinnerEvents();
    return;
  }
  btn.textContent = "並び替えリスト表示";
  const results = await Promise.all(
    settings.sites.map((site, index) => loadLatest(site, index))
  );

  document.getElementById("sites").innerHTML = results.join("");
  attachCustomSpinnerEvents();
}
main();
</script>

</body>
</html>
