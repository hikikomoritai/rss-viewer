<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>まとめサイト 最新記事一覧（カスタム版）</title>
<style>
body {
  font-family: sans-serif;
  margin: 20px;
  background-color: #121212;
  color: #e0e0e0;
}

h1 {
  font-size: 24px;
  color: #ffffff;
}

.site {
  margin-bottom: 30px;
  background: #1e1e1e;
  padding: 15px;
  border-radius: 8px;
  border: 1px solid #333;
}

.site h2 a {
  color: #80cbc4;
  text-decoration: none;
}

.site h2 a:hover {
  text-decoration: underline;
}

li a {
  color: #90caf9;
  text-decoration: none;
}

li a:hover {
  text-decoration: underline;
}

span.date {
  color: #aaaaaa;
}

#settingsBox {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 8px;
  border: 1px solid #333;
  margin-bottom: 20px;
  display: none;
}

/* ★追加：ドラッグ用 */
.draggable {
  cursor: grab;
  padding: 6px;
  border: 1px solid #444;
  margin-bottom: 6px;
  background: #222;
  border-radius: 5px;
}
.dragging {
  opacity: 0.5;
}
</style>
</head>
<body>

<h1>まとめサイト 最新記事一覧（カスタム版）</h1>
<button id="toggleSettings">設定を開く/閉じる</button>

<div id="settingsBox">
  <h2>設定</h2>

  表示件数（デフォルト）：
  <select id="limit">
    <option value="5">5件</option>
    <option value="10">10件</option>
    <option value="20">20件</option>
    <option value="50">50件</option>
  </select>

  <button id="saveSettings">適用</button>

  <h3>サイト追加</h3>
  <input id="newSiteName" placeholder="サイト名（空欄で自動取得）">
  <input id="newSiteUrl" placeholder="RSS URL">
  <button id="addSite">追加</button>

  <h3>サイトごとの設定（並び替え＋件数）</h3>
  <div id="siteSettings"></div>

  <div style="margin-top:10px;">
    <button id="exportSettings">設定をエクスポート</button>
  </div>

  <div style="margin-top:10px;">
    <input type="file" id="importSettings" style="display:none">
    <button id="importButton">設定をインポート</button>
  </div>

  <div style="margin-top:10px;">
    <button id="resetSettings">クッキーリセット</button>
  </div>
</div>

<div id="sites"></div>

<script>
// ▼ デフォルトサイト
const defaultSites = [
  { name: "GIGAZINE", rss: "https://gigazine.net/news/rss_2.0", limit: 10 }
];

// ▼ localStorage から読み込み
let settings = JSON.parse(localStorage.getItem("rss_settings")) || {
  limit: 10,
  sites: defaultSites
};

// ▼ UI に反映
document.getElementById("limit").value = settings.limit;

// ▼ 設定保存
function saveSettings() {
  settings.limit = Number(document.getElementById("limit").value);
  localStorage.setItem("rss_settings", JSON.stringify(settings));
  main();
}
document.getElementById("saveSettings").onclick = saveSettings;

// ▼ サイト追加
document.getElementById("addSite").onclick = async () => {
  let name = document.getElementById("newSiteName").value;
  const url = document.getElementById("newSiteUrl").value;

  if (!url) {
    alert("RSS URL を入力してください");
    return;
  }

  if (settings.sites.some(s => s.rss === url)) {
    alert("このサイトはすでに登録されています");
    return;
  }

  let xmlText = "";
  try {
    xmlText = await fetchViaCloudflare(url);
  } catch (e) {
    alert("RSS を取得できませんでした");
    return;
  }

  const xml = new DOMParser().parseFromString(xmlText, "text/xml");
  const isValid =
    xml.querySelector("item") ||
    xml.querySelector("entry") ||
    xml.querySelector("rdf\\:li");

  if (!isValid) {
    alert("RSS を取得できませんでした");
    return;
  }

  if (!name) {
    name =
      xml.querySelector("title")?.textContent?.trim() ||
      xml.querySelector("channel > title")?.textContent?.trim() ||
      xml.querySelector("feed > title")?.textContent?.trim() ||
      "名称未設定サイト";
  }

  settings.sites.unshift({ name, rss: url, limit: settings.limit });
  saveSettings();
  main();
  alert("サイトを追加しました");
};

// ▼ エクスポート
document.getElementById("exportSettings").onclick = () => {
  const data = JSON.stringify(settings, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "rss-settings.json";
  a.click();

  URL.revokeObjectURL(url);
};

// ▼ インポート
document.getElementById("importButton").onclick = () => {
  document.getElementById("importSettings").click();
};

document.getElementById("importSettings").onchange = (event) => {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    try {
      const imported = JSON.parse(reader.result);
      if (!imported.sites || !Array.isArray(imported.sites)) {
        alert("設定ファイルが不正です");
        return;
      }
      settings = imported;
      localStorage.setItem("rss_settings", JSON.stringify(settings));
      main();
      alert("設定をインポートしました");
    } catch (e) {
      alert("設定ファイルの読み込みに失敗しました");
    }
  };
  reader.readAsText(file);
};

// ▼ リセット
document.getElementById("resetSettings").onclick = () => {
  localStorage.removeItem("rss_settings");
  settings = { limit: 10, sites: defaultSites };
  main();
};

// ▼ 設定開閉
document.getElementById("toggleSettings").onclick = () => {
  const box = document.getElementById("settingsBox");
  const current = window.getComputedStyle(box).display;
  box.style.display = current === "none" ? "block" : "none";
};

// ▼ Cloudflare Worker
async function fetchViaCloudflare(url) {
  const api = "https://summer-truth-854e.watashigyuudondesu.workers.dev/?v=2&url=";
  const res = await fetch(api + encodeURIComponent(url));
  return await res.text();
}

// ▼ 個別 limit 更新
function updateSiteLimit(index, value) {
  settings.sites[index].limit = Number(value);
  saveSettings();
  main();
}

// ▼ サイト設定 UI（並び替え＋件数）
function renderSiteSettings() {
  const box = document.getElementById("siteSettings");
  box.innerHTML = settings.sites
    .map(
      (site, index) => `
    <div class="draggable" draggable="true" data-index="${index}">
      <strong>${site.name}</strong>
      <input type="number" min="1" value="${site.limit || settings.limit}"
        onchange="updateSiteLimit(${index}, this.value)"
        style="width:60px; margin-left:10px;">
    </div>
  `
    )
    .join("");

  enableDragSort();
}

// ▼ ドラッグ＆ドロップ並び替え
function enableDragSort() {
  const container = document.getElementById("siteSettings");

  container.addEventListener("dragstart", e => {
    if (!e.target.classList.contains("draggable")) return;
    e.target.classList.add("dragging");
  });

  container.addEventListener("dragend", e => {
    if (!e.target.classList.contains("draggable")) return;
    e.target.classList.remove("dragging");

    // 並び順を保存
    const newOrder = [...container.children].map(c => {
      const index = Number(c.getAttribute("data-index"));
      return settings.sites[index];
    });

    settings.sites = newOrder;
    saveSettings();
    main();
  });

  container.addEventListener("dragover", e => {
    e.preventDefault();
    const dragging = document.querySelector(".dragging");
    if (!dragging) return;

    const afterElement = getDragAfterElement(container, e.clientY);
    if (afterElement == null) {
      container.appendChild(dragging);
    } else {
      container.insertBefore(dragging, afterElement);
    }
  });
}

// ★ズレない位置判定ロジック
function getDragAfterElement(container, y) {
  const scrollY = window.scrollY; // ★スクロール補正
  const draggableElements = [...container.querySelectorAll(".draggable:not(.dragging)")];

  return draggableElements.reduce(
    (closest, child) => {
      const box = child.getBoundingClientRect();
      const boxCenter = box.top + scrollY + box.height / 2; // ★補正後の中心位置
      const offset = y + scrollY - boxCenter; // ★マウス位置も補正

      if (offset < 0 && offset > closest.offset) {
        return { offset: offset, element: child };
      } else {
        return closest;
      }
    },
    { offset: Number.NEGATIVE_INFINITY }
  ).element;
}

// ▼ RSS 読み込み
async function loadLatest(site) {
  let xmlText = await fetchViaCloudflare(site.rss);

  if (!xmlText.includes("<item") &&
      !xmlText.includes("<entry") &&
      !xmlText.includes("rdf:li")) {
    return `<div class="site"><h2>${site.name}</h2>取得できませんでした。</div>`;
  }

  const xml = new DOMParser().parseFromString(xmlText, "text/xml");
  let items = [...xml.querySelectorAll("item, entry")];

  const limit = site.limit || settings.limit;

  if (items.length === 0) {
    const links = [...xml.getElementsByTagName("rdf:li")].map(li =>
      li.getAttribute("rdf:resource")
    );

    items = links.map(link => {
      const itemNode = xml.querySelector(`item[rdf\\:about="${link}"]`);
      const title = itemNode?.querySelector("title")?.textContent ?? link;
      const date = itemNode?.querySelector("dc\\:date")?.textContent || null;
      return { title, link, date };
    }).slice(0, limit);
  } else {
    items = items.slice(0, limit).map(item => {
      const title = item.querySelector("title")?.textContent ?? "タイトルなし";
      const link =
        item.querySelector("link")?.textContent?.trim() ||
        item.querySelector("link")?.getAttribute("href") ||
        item.querySelector("guid")?.textContent?.trim() ||
        item.getAttribute("rdf:about") ||
        "#";

      const pubDate =
        item.querySelector("pubDate")?.textContent ||
        item.querySelector("dc\\:date")?.textContent ||
        item.querySelector("updated")?.textContent ||
        item.querySelector("published")?.textContent ||
        item.querySelector("date")?.textContent;

      return { title, link, date: pubDate };
    });
  }

  const siteUrl = site.rss.replace(/\/[^/]*$/, "");
  let html = `
  <div class="site">
    <h2>
      <a href="${siteUrl}" target="_blank">${site.name}</a>
      <button onclick="deleteSite('${site.name}')">削除</button>
    </h2>
    <ul>
  `;

  for (const item of items) {
    const dateText = item.date ? new Date(item.date).toLocaleString() : "日付なし";
    html += `
      <li>
        <a href="${item.link}" target="_blank">${item.title}</a><br>
        <span class="date">（${dateText}）</span>
      </li>
    `;
  }

  html += "</ul></div>";
  return html;
}

// ▼ サイト削除
function deleteSite(name) {
  settings.sites = settings.sites.filter(s => s.name !== name);
  saveSettings();
  main();
}

// ▼ メイン
async function main() {
  const results = await Promise.all(settings.sites.map(loadLatest));
  document.getElementById("sites").innerHTML = results.join("");
  renderSiteSettings(); // ★追加
}

main();
</script>

</body>
</html>
