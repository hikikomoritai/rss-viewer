<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>まとめサイト 最新記事一覧（カスタム版）</title>
<style>
body {
  font-family: sans-serif;
  margin: 20px;
  background-color: #121212;
  color: #e0e0e0;
}

h1 {
  font-size: 24px;
  color: #ffffff;
}

.site {
  margin-bottom: 30px;
  background: #1e1e1e;
  padding: 15px;
  border-radius: 8px;
  border: 1px solid #333;
}

.site h2 a {
  color: #80cbc4;
  text-decoration: none;
}

.site h2 a:hover {
  text-decoration: underline;
}

li a {
  color: #90caf9;
  text-decoration: none;
}

li a:hover {
  text-decoration: underline;
}

span.date {
  color: #aaaaaa;
}

#settingsBox {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 8px;
  border: 1px solid #333;
  margin-bottom: 20px;
  display: none; /* 初期状態は閉じる */
}
</style>
</head>
<body>

<h1>まとめサイト 最新記事一覧（カスタム版）</h1>
<button id="toggleSettings">設定を開く/閉じる</button>
<div id="settingsBox">
  <h2>設定</h2>

  表示件数：
  <select id="limit">
    <option value="5">5件</option>
    <option value="10">10件</option>
    <option value="20">20件</option>
    <option value="50">50件</option>
  </select>

  <button id="saveSettings">保存</button>

  <h3>サイト追加</h3>
  <input id="newSiteName" placeholder="サイト名（空欄で自動取得）">
  <input id="newSiteUrl" placeholder="RSS URL">
  <div style="margin-top:10px;">
    <button id="addSite">追加</button>
  </div>
    
  <div style="margin-top:10px;">
    <button id="exportSettings">設定をエクスポート</button>
  </div>
  
  <div style="margin-top:10px;">
    <input type="file" id="importSettings" style="display:none">
    <button id="importButton">設定をインポート</button>
  </div>
  
  <div style="margin-top:10px;">
    <button id="resetSettings">クッキーリセット</button>
  </div>
</div>

<div id="sites"></div>

<script>
// ▼ デフォルトサイト
const defaultSites = [
  { name: "GIGAZINE", rss: "https://gigazine.net/news/rss_2.0" },
  { name: "汎用型自作PCまとめ", rss: "http://www.jisaka.com/index.rdf" },
  { name: "ニッチなPCゲーマーの環境構築Z", rss: "https://www.nichepcgamer.com/feed" },
  { name: "Game*Spark", rss: "https://www.gamespark.jp/rss/index.rdf" },
  { name: "北森瓦版", rss: "https://northwood.blog.fc2.com/?xml" },
  { name: "痛いニュース(ﾉ∀`)", rss: "https://itainews.com/index.rdf" },
  { name: "無題のドキュメント", rss: "https://mute-sound-848f.watashigyuudondesu.workers.dev/mudaino" }
];

// ▼ localStorage から読み込み
let settings = JSON.parse(localStorage.getItem("rss_settings")) || {
  limit: 10,
  sites: defaultSites
};

// ▼ UI に反映
document.getElementById("limit").value = settings.limit;

// ▼ 設定保存
function saveSettings() {
  settings.limit = document.getElementById("limit").value;
  localStorage.setItem("rss_settings", JSON.stringify(settings));
  main();   // ← 保存した瞬間に再読み込み
}
document.getElementById("saveSettings").onclick = saveSettings;

// ▼ サイト追加
document.getElementById("addSite").onclick = async () => {
  let name = document.getElementById("newSiteName").value;
  const url = document.getElementById("newSiteUrl").value;

  if (!url) {
    alert("RSS URL を入力してください");
    return;
  }

  // ▼ 重複チェック
  if (settings.sites.some(s => s.rss === url)) {
    alert("このサイトはすでに登録されています");
    return;
  }

  // ▼ RSS を事前チェック（取得できなければ追加しない）
  let xmlText = "";
  try {
    xmlText = await fetchViaCloudflare(url);
  } catch (e) {
    alert("RSS を取得できませんでした（ネットワークエラー）");
    return;
  }

  const xml = new DOMParser().parseFromString(xmlText, "text/xml");

  const isValid =
    xml.querySelector("item") ||
    xml.querySelector("entry") ||
    xml.querySelector("rdf\\:li");

  if (!isValid) {
    alert("RSS を取得できませんでした（RSS/Atom/RDF ではありません）");
    return;
  }

  // ▼ サイト名が空なら RSS から自動取得
  if (!name) {
    name =
      xml.querySelector("title")?.textContent?.trim() ||
      xml.querySelector("channel > title")?.textContent?.trim() ||
      xml.querySelector("feed > title")?.textContent?.trim() ||
      "名称未設定サイト";
  }

  // ▼ 追加したサイトを一番上に
  settings.sites.unshift({ name, rss: url });

  saveSettings();
  main();

  alert("サイトを追加しました");
};
 
document.getElementById("exportSettings").onclick = () => {
  const data = JSON.stringify(settings, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "rss-settings.json";
  a.click();

  URL.revokeObjectURL(url);
};
document.getElementById("importButton").onclick = () => {
  document.getElementById("importSettings").click();
};

document.getElementById("importSettings").onchange = (event) => {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    try {
      const imported = JSON.parse(reader.result);

      // ▼ バリデーション（最低限）
      if (!imported.sites || !Array.isArray(imported.sites)) {
        alert("設定ファイルが不正です");
        return;
      }

      settings = imported;
      localStorage.setItem("rss_settings", JSON.stringify(settings));
      main();
      alert("設定をインポートしました");
    } catch (e) {
      alert("設定ファイルの読み込みに失敗しました");
    }
  };

  reader.readAsText(file);
};

document.getElementById("resetSettings").onclick = () => {
  localStorage.removeItem("rss_settings");
  settings = { limit: 10, sites: defaultSites };
  main();
};
document.getElementById("toggleSettings").onclick = () => {
  const box = document.getElementById("settingsBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
};

// ▼ Cloudflare Worker 経由で CORS 回避
async function fetchViaCloudflare(url) {
  if (url.includes("mute-sound-848f")) {
    const res = await fetch(url);
    return await res.text();
  }
  const api = "https://summer-truth-854e.watashigyuudondesu.workers.dev/?v=2&url=";
  const res = await fetch(api + encodeURIComponent(url));
  return await res.text();
}

// ▼ RSS / Atom / RDF 自動判定
async function loadLatest(site) {
  let xmlText = await fetchViaCloudflare(site.rss);

  if (!xmlText.includes("<item") &&
      !xmlText.includes("<entry") &&
      !xmlText.includes("rdf:li")) {
    return `<div class="site"><h2>${site.name}</h2>取得できませんでした。</div>`;
  }

  const xml = new DOMParser().parseFromString(xmlText, "text/xml");
  let items = [...xml.querySelectorAll("item, entry")];

  if (items.length === 0) {
    const links = [...xml.getElementsByTagName("rdf:li")].map(li =>
      li.getAttribute("rdf:resource")
    );

    items = links.map(link => {
      const itemNode = xml.querySelector(`item[rdf\\:about="${link}"]`);
      const title = itemNode?.querySelector("title")?.textContent ?? link;
      const date = itemNode?.querySelector("dc\\:date")?.textContent || null;
      return { title, link, date };
    }).slice(0, settings.limit);
  } else {
    items = items.slice(0, settings.limit).map(item => {
      const title = item.querySelector("title")?.textContent ?? "タイトルなし";
      const link =
        item.querySelector("link")?.textContent?.trim() ||
        item.querySelector("link")?.getAttribute("href") ||
        item.querySelector("guid")?.textContent?.trim() ||
        item.getAttribute("rdf:about") ||
        "#";

      const pubDate =
        item.querySelector("pubDate")?.textContent ||
        item.querySelector("dc\\:date")?.textContent ||
        item.querySelector("updated")?.textContent ||
        item.querySelector("published")?.textContent ||
        item.querySelector("date")?.textContent;

      return { title, link, date: pubDate };
    });
  }

  const siteUrl = site.rss.replace(/\/[^/]*$/, "");
  let html = `
  <div class="site">
    <h2>
      <a href="${siteUrl}" target="_blank">${site.name}</a>
      <button onclick="deleteSite('${site.name}')">削除</button>
    </h2>
    <ul>
  `;

  for (const item of items) {
    const dateText = item.date ? new Date(item.date).toLocaleString() : "日付なし";
    html += `
      <li>
        <a href="${item.link}" target="_blank">${item.title}</a><br>
        <span class="date">（${dateText}）</span>
      </li>
    `;
  }

  html += "</ul></div>";
  return html;
}
function deleteSite(name) {
  settings.sites = settings.sites.filter(s => s.name !== name);
  saveSettings();
  main();
}

// ▼ メイン処理（並列）
async function main() {
  const results = await Promise.all(settings.sites.map(loadLatest));
  document.getElementById("sites").innerHTML = results.join("");
}

main();
</script>

</body>
</html>
